server:
  port: 8080

spring:
  application:
    name: ai-askquestion
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_askquestion?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.ai.askquestion.domain
  configuration:
    map-underscore-to-camel-case: true

ai:
  openai:
    api-key: ${AI_OPENAI_API_KEY:api-key}
    model-name: ${AI_OPENAI_MODEL_NAME:DeepSeek-R1-0528-Qwen3-8B}
    temperature: ${AI_OPENAI_TEMPERATURE:0.6}
    max-tokens: ${AI_OPENAI_MAX_TOKENS:1000}
    timeout: ${AI_OPENAI_TIMEOUT:60}
    baseUrl: ${AI_OPENAI_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}

knowledge:
  base-path: ${KNOWLEDGE_BASE_PATH:src/main/resources/knowledge-base}
  chunk-size: ${KNOWLEDGE_CHUNK_SIZE:500}
  chunk-overlap: ${KNOWLEDGE_CHUNK_OVERLAP:100}

app:
  elasticsearch:
    enabled: ${APP_ELASTICSEARCH_ENABLED:false}
    base-url: ${APP_ELASTICSEARCH_BASE_URL:http://localhost:9200}
    knowledge-chunk-index: ${APP_ELASTICSEARCH_KNOWLEDGE_CHUNK_INDEX:knowledge_chunk_index}
    qa-question-index: ${APP_ELASTICSEARCH_QA_QUESTION_INDEX:qa_question_index}
    top-k: ${APP_ELASTICSEARCH_TOP_K:5}
    min-score: ${APP_ELASTICSEARCH_MIN_SCORE:0.0}

qa:
  cache:
    exact-enabled: true
    similar-enabled: false
    exact-threshold: 0.98
    verified-similar-threshold: 0.88
    reference-similar-threshold: 0.75

logging:
  level:
    root: INFO
    com.ai.askquestion: DEBUG
